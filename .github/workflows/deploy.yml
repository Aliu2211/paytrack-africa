name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest boto3 moto google-genai reportlab
      - run: pytest tests/ -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # Required for the OIDC token exchange in configure-aws-credentials --
    # without this the job has no way to request the token GitHub signs.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # TEMPORARY: decode the actual OIDC token's claims to debug why
      # AssumeRoleWithWebIdentity keeps rejecting it. Prints sub/aud only
      # (no secrets) -- removed once the mismatch is found.
      - name: Debug OIDC claims
        run: |
          cat > /tmp/decode_claims.py << 'PYEOF'
          import sys, json, base64
          token = json.load(sys.stdin)['value']
          payload = token.split('.')[1]
          payload += '=' * (-len(payload) % 4)
          claims = json.loads(base64.urlsafe_b64decode(payload))
          keys = ('sub', 'aud', 'iss', 'repository', 'ref', 'event_name')
          print(json.dumps({k: claims[k] for k in keys if k in claims}, indent=2))
          PYEOF
          curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" \
            | python3 /tmp/decode_claims.py
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - run: bash scripts/package_lambdas.sh
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
        working-directory: infrastructure
      - run: terraform plan -var="state_bucket_name=paytrack-tf-state-2026"
        working-directory: infrastructure
      - run: terraform apply -auto-approve -var="state_bucket_name=paytrack-tf-state-2026"
        working-directory: infrastructure
